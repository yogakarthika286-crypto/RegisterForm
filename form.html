<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
      <h1>Registration Form</h1>
    <div class="container" >
         <table>
      <tr>
        <form >
            <tr>
            <td><label>Full Name :</label></td>
            <td><input type="text" placeholder=" Eneter your name" id="name" ></td>
            </tr>
            <tr>
            <td><label>Email :</label></td>
            <td><input type="text" placeholder=" Enter your Email" id="mail"></td>
            </tr>
            <tr>
                <td><label>Phone Number</label></td>
                <td><input type="tel" placeholder=" +91 Enter your Number"></td>
            </tr>
            <tr>
            <td><label>Password :</label></td>
            <td><input type="password" placeholder=" Enter your password" id="number"></td>
            </tr> 
            <tr>
            <td><label>Date of Birth :</label></td>
            <td><input type="date"></td>
            </tr>
            <tr>
            <td><label>Gender :</label></td>
            <td><input type="radio" name="Gender"value="Male">Male
            <input type="radio" name="Gender" value="Female">Female
            <input type="radio" name="Gender" value="Other">Other</td>
           </tr>
           <tr>
            <td><label for="msg">Address :</label></td>
            <td><textarea name="msg" id="msg" cols="20" rows="5" placeholder="Enetr Your Address"></textarea></td>
            </tr>
            <tr>
            <td><label>Country :</label></td>
            <td>
            <select>
                <option>India</option>
                <option>Uk</option>
                <option>Iran</option>
                <option>Ukarin</option>
                <option>Koran</option>
                <option>Japan</option>
                <option>Urope</option>
                <option>North korea</option>
            </select></td>
            </tr>
            <tr>.
            <td><label>Upolad profile picture</label></td>
            <td><input type="file"></td>
            </tr>
            <tr>
            <td><input type="checkbox" > I agree to the terms and conditions</td>
            </tr>
            
            <tr>
            <td><button  class="submit">submit</button>
            <button class="reset">Reset</button></td>
            </tr>
        </form>
        </tr>
    </table>
    </div>
    
</body>
</html>
